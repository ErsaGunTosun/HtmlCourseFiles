<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metin Biçimlendirme</title>
</head>
<body style="text-align: center;">

    <p>Hello World</p> <!-- Normal metin -->
    <p><b>Hello World</b></p><!-- Kalın metin -->
    <p><i>Hello World</i></p><!-- İtalic metin -->
    <p><big>Hello World</big></p><!-- Büyük metin -->
    <p><small>Hello World</small></p><!-- Küçük metin-->
    <p><strong>Hello World</strong></p><!-- Önemli metin -->
    <p><ins>Hello World</ins></p><!-- Altı çizili metin -->
    <p><del>Hello World</del></p><!-- Üzeri çizili metin-->
    <p>X<sub>2</sub></p><!-- Metin altında metin -->
    <p>X<sup>2</sup></p><!-- Metin üstünde metin -->
    
</body>
</html>
