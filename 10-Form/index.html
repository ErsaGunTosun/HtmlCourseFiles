<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="">
        <!-- normal input-->
        <input type="text" placeholder="İsim">
        <br>
        <br>

        <!-- Password input -->
        <input type="password" name="" id="" placeholder="Şifre">
        <br>
        <br>

        <!-- Buton -->
        <input type="button" value="Gönder">
        <br>
        <br>

        <!-- Tarih input -->
        <input type="date" name="" id="">
        <br>
        <br>

        <!-- Dosya input-->
        <input type="color" name="" id="">
        <br>
        <br>

        <!-- mail input-->
        <input type="file" name="" id="">
        <br>
        <br>

        <!-- raido input  -->
        <input type="radio" name="cinsiyet" id="" value="Erkek">Erkek
        <input type="radio" name="cinsiyet" id="" value="Kadın">Kadın
        <br>
        <br>

        <!-- Seçim-->
        <select name="" id="">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>
    </form>

</body>

</html>
