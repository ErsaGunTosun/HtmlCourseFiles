<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste etiketi</title>
</head>

<body>
    <!-- Düzensiz liste-->
    <ul>
        <h2>Dersler</h2>
        <li>Matematik</li>
        <li>Fizik</li>
        <li>Kimya</li>
        <li>Biyoloji</li>
    </ul>

    <!-- Düzenli Liste-->
    <!-- type  1= sayı şeklinde -->
    <!-- A = Büyük Harf sıralması a = Küçük harf sıralaması -->
    <!-- I = Büyük roman rakam sıralaması i = küçük roman rakam sırası  -->
    <ol type="I">
        <h2>Fizik Konuları</h2>
        <li>Atom Modelleri</li>
        <li>Çembersel Hareket</li>
        <li>Modern Fizik</li>
        <li>Dalgalar</li>
    </ol>

</body>

</html>
