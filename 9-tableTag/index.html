<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablo etiketi</title>
</head>

<body>

    <!-- collspan yan yana kendi değeri kadar yer alır-->
    <!-- rowspan alt alta kendi değeri kadar yer alır -->

    <table style="width:100%;">
        <thead style="text-align: left;"> <!-- Tablonun baş kısmını oluşturur-->
            <tr>
                <th>Takımlar</th><!-- Tabloya başlık oluşturur -->
                <th>Win</th>
                <th>Lose</th>
            </tr>
        </thead>
        <tbody> <!-- Tablonun ana kısmını oluşuturur -->
            <tr><!-- Satır oluşuturur-->
                <td>GS</td><!-- Satıra değer atar-->
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>FB</td>
                <td>4</td>
                <td>5</td>
            </tr>
            <tr>
                <td>BJk</td>
                <td>2</td>
            </tr>
        </tbody>
    </table>
    
</body> 

</html>
