<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim Formu</title>
</head>

<body>
    <h2>İletişim Formu</h2>
    <form method="get" style="text-align:left;">
        <div>
            <b>İsim:</b> <input type="text" value="" name="isim" placeholder="İsim">
        </div>
        <br>
        <div>
            <b>Soyisim:</b> <input type="text" value="" name="soyisim" placeholder="Soyisim">
        </div>
        <br>
        <div>
            <b>Sevdiğiniz Spor:</b>
            <input type="radio" name="spor" id="">Futbol
            <input type="radio" name="spor" id="">Basketbol
            <input type="radio" name="spor" id="">Voleybol
        </div>
        <br>
        <div>
            <b>Cinsiyet</b>
            <input type="radio" name="cinsiyet" id="">Erkek
            <input type="radio" name="cinsiyet" id="">Kadın
        </div>
        <br>
        <div>
            <p><b>Güvenlik Sorusu:</b> Türkiyenin Başkenti</p>
            <select name="soru" id="">
                <option value="İstanbul">İstanbul</option>
                <option value="İzmir">İzmir</option>
                <option value="Ankara">Ankara</option>
                <option value="Trabzon">Trabzon</option>
            </select>
        </div>
        <br>
        <div>
            <input type="submit" value="Gönder" s>
        </div>
    </form>
</body>

</html>
